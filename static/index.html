<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>seyed RealEstate · Find Your Dream Home</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="icon" href="../images/main_logo.jpg?v=2" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="/static/js/security.js"></script>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="container nav-container">
        <a href="/" class="brand">🏠 seyed RealEstate</a>
        <button
          class="nav-toggle"
          id="navToggle"
          aria-label="Toggle navigation"
        >
          <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="navLinks">
          <a href="/">Home</a>
          <span id="auth-links">
            <a href="/login">Login</a>
            <a href="/register">Register</a>
          </span>
          <span id="user-links" style="display: none">
            <a href="/dashboard">Dashboard</a>
            <a href="#" id="logout-link">Logout</a>
          </span>
        </div>
      </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
      <div class="container">
        <h1>Find Your Dream Property</h1>
        <p>Browse through thousands of listings and connect with sellers.</p>
        <div class="search-bar">
          <input
            type="text"
            id="search-location"
            placeholder="Location (city)"
          />
          <input
            type="number"
            id="search-min-price"
            placeholder="Min price"
            min="0"
          />
          <input
            type="number"
            id="search-max-price"
            placeholder="Max price"
            min="0"
          />
          <select id="search-type">
            <option value="">All Types</option>
            <option value="Apartment">Apartment</option>
            <option value="Villa">Villa</option>
            <option value="Land">Land</option>
            <option value="Townhouse">Townhouse</option>
            <option value="Other">Other</option>
          </select>
          <button id="search-btn">Search</button>
        </div>
      </div>
    </section>

    <!-- Listings -->
    <section class="listings-section">
      <div class="container">
        <div class="section-header">
          <h2>Latest Properties</h2>
          <span class="section-badge" id="result-count"></span>
        </div>
        <div class="listings-grid" id="listings-grid">
          <p class="no-listings">Loading…</p>
        </div>
        <!-- Pagination will be injected here -->
      </div>
    </section>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
      // ---- Nav toggle ----
      const toggle = document.getElementById("navToggle");
      const links = document.getElementById("navLinks");
      if (toggle && links) {
        toggle.addEventListener("click", function (e) {
          e.stopPropagation();
          links.classList.toggle("open");
          toggle.classList.toggle("active");
        });
        document.addEventListener("click", function (e) {
          if (!links.contains(e.target) && !toggle.contains(e.target)) {
            links.classList.remove("open");
            toggle.classList.remove("active");
          }
        });
      }

      // ---- Auth UI ----
      function updateAuthUI() {
        fetch("/api/user")
          .then((r) => r.json())
          .then((user) => {
            const authLinks = document.getElementById("auth-links");
            const userLinks = document.getElementById("user-links");
            if (user && user.id) {
              if (authLinks) authLinks.style.display = "none";
              if (userLinks) userLinks.style.display = "inline-flex";
              const dash = document.querySelector("#user-links a:first-child");
              if (dash) {
                if (user.role === "admin") {
                  dash.textContent = "Admin Panel";
                  dash.href = "/admin";
                } else {
                  dash.textContent = "Dashboard";
                  dash.href = "/dashboard";
                }
              }
            } else {
              if (authLinks) authLinks.style.display = "inline-flex";
              if (userLinks) userLinks.style.display = "none";
            }
          })
          .catch(() => {});
      }

      // ---- Logout ----
      async function handleLogout(e) {
        e.preventDefault();
        try {
          await apiFetch("/api/logout", { method: "POST" });
          window.location.href = "/";
        } catch (err) {
          console.error("Logout error:", err);
        }
      }

      // ---- Load listings with pagination ----
      async function loadListings(page = 1) {
        const location = document.getElementById("search-location").value.trim();
        let minPrice = document.getElementById("search-min-price").value;
        let maxPrice = document.getElementById("search-max-price").value;
        const type = document.getElementById("search-type").value;

        // Validate numeric inputs
        if (minPrice !== "") {
          const num = parseFloat(minPrice);
          if (isNaN(num) || num < 0) minPrice = "";
          else minPrice = num;
        }
        if (maxPrice !== "") {
          const num = parseFloat(maxPrice);
          if (isNaN(num) || num < 0) maxPrice = "";
          else maxPrice = num;
        }

        let url = `/api/listings?page=${page}&per_page=12`;
        if (location) url += "&location=" + encodeURIComponent(location);
        if (minPrice !== "") url += "&min_price=" + minPrice;
        if (maxPrice !== "") url += "&max_price=" + maxPrice;
        if (type) url += "&property_type=" + encodeURIComponent(type);

        const grid = document.getElementById("listings-grid");
        const count = document.getElementById("result-count");

        try {
          const data = await apiFetch(url);
          const listings = data.data || [];
          const meta = data.meta || {};

          if (!listings || listings.length === 0) {
            grid.innerHTML = '<p class="no-listings">No listings found. Try adjusting your filters.</p>';
            if (count) count.textContent = "";
            return;
          }
          if (count) count.textContent = meta.total + " properties";

          let html = "";
          listings.forEach((listing) => {
            const title = sanitizeHTML(listing.title);
            const price = Number(listing.price).toLocaleString();
            const location = sanitizeHTML(listing.location);
            const type = listing.property_type || "Property";
            const bedrooms = listing.bedrooms || "?";
            const bathrooms = listing.bathrooms || "?";
            const imageHtml =
              listing.images && listing.images.length > 0
                ? `<img src="/uploads/${listing.images[0].filename}" alt="${title}" loading="lazy">`
                : `<div class="no-image">No image</div>`;
            html += `
              <div class="listing-card" data-id="${listing.id}">
                <div class="listing-image">
                  ${imageHtml}
                  <span class="listing-type-badge">${sanitizeHTML(type)}</span>
                </div>
                <div class="listing-info">
                  <h3>${title}</h3>
                  <p class="price">$${price}</p>
                  <p class="location">📍 ${location}</p>
                  <p class="type">${bedrooms} beds · ${bathrooms} baths</p>
                <a href="/listing/${listing.id}" class="btn-view">View Details →</a>
              </div>
            </div>
          `;
        });
        grid.innerHTML = sanitizeHTML(html); // sanitize entire block

        // Add pagination controls (simple example)
        let paginationHtml = '';
        if (meta.total_pages > 1) {
          paginationHtml = '<div class="pagination">';
          if (meta.page > 1) {
            paginationHtml += `<button onclick="loadListings(${meta.page - 1})">Prev</button>`;
          }
          paginationHtml += `<span>Page ${meta.page} of ${meta.total_pages}</span>`;
          if (meta.page < meta.total_pages) {
            paginationHtml += `<button onclick="loadListings(${meta.page + 1})">Next</button>`;
          }
          paginationHtml += '</div>';
        }
        // Insert pagination after grid
        const existingPagination = document.querySelector('.pagination');
        if (existingPagination) existingPagination.remove();
        if (paginationHtml) {
          const paginationDiv = document.createElement('div');
          paginationDiv.className = 'pagination';
          paginationDiv.innerHTML = sanitizeHTML(paginationHtml);
          grid.parentNode.appendChild(paginationDiv);
        }
      }

      // ... rest (logout, search button, etc.) ...
    </script>
  </body>
</html>
