<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Listing - RealEstate</title>
    <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/" class="brand">🏠seyed RealEstate</a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="/">Home</a>
                <a href="/dashboard">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="form-container">
        <h2>Create New Listing</h2>
        <form id="create-form" enctype="multipart/form-data">
            <!-- Title -->
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required />
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" required></textarea>
            </div>

            <!-- Row: Price + Location -->
            <div class="form-row">
                <div class="form-group half">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" required />
                </div>
                <div class="form-group half">
                    <label for="location">Location (City)</label>
                    <input type="text" id="location" name="location" required />
                </div>
            </div>

            <!-- Row: Property Type + Area -->
            <div class="form-row">
                <div class="form-group half">
                    <label for="property_type">Property Type</label>
                    <select id="property_type" name="property_type" required>
                        <option value="Apartment">Apartment</option>
                        <option value="Villa">Villa</option>
                        <option value="Land">Land</option>
                        <option value="Townhouse">Townhouse</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group half">
                    <label for="area">Area (sq ft)</label>
                    <input type="number" id="area" name="area" step="0.1" min="0" />
                </div>
            </div>

            <!-- Row: Bedrooms + Bathrooms -->
            <div class="form-row">
                <div class="form-group half">
                    <label for="bedrooms">Bedrooms</label>
                    <input type="number" id="bedrooms" name="bedrooms" min="0" />
                </div>
                <div class="form-group half">
                    <label for="bathrooms">Bathrooms</label>
                    <input type="number" id="bathrooms" name="bathrooms" min="0" />
                </div>
            </div>

            <!-- Row: Contact Phone + Social -->
            <div class="form-row">
                <div class="form-group half">
                    <label for="contact_phone">Contact Phone</label>
                    <input type="text" id="contact_phone" name="contact_phone" />
                </div>
                <div class="form-group half">
                    <label for="contact_social">Social Media</label>
                    <input type="text" id="contact_social" name="contact_social" />
                </div>
            </div>

            <!-- Images -->
            <div class="form-group">
                <label for="images">Upload Images (multiple)</label>
                <input type="file" id="images" name="images" accept="image/*" multiple />
                <small>You can select several images at once.</small>
            </div>

            <div id="create-error" class="error-message"></div>
            <button type="submit" class="btn-primary">Create Listing</button>
        </form>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        // Nav toggle
        const toggle = document.getElementById('navToggle');
        const links = document.getElementById('navLinks');
        if (toggle && links) {
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                links.classList.toggle('open');
                toggle.classList.toggle('active');
            });
            document.addEventListener('click', function(e) {
                if (!links.contains(e.target) && !toggle.contains(e.target)) {
                    links.classList.remove('open');
                    toggle.classList.remove('active');
                }
            });
        }

        document.getElementById('create-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            try {
                const data = await apiFetch('/api/listings', {
                    method: 'POST',
                    body: formData,
                });
                window.location.href = '/dashboard?created=true';
            } catch (err) {
                document.getElementById('create-error').textContent = err.message || 'Failed to create listing.';
            }
        });
    </script>
</body>
</html>
