<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - RealEstate</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container nav-container">
        <a href="/" class="brand">🏠seyed RealEstate</a>
        <button
          class="nav-toggle"
          id="navToggle"
          aria-label="Toggle navigation"
        >
          <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="navLinks">
          <a href="/">Home</a>
          <a href="/dashboard">Dashboard</a>
          <a href="#" id="logout-link">Logout</a>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="admin-panel-container">
        <h2>📋 Pending Listings</h2>
        <div id="pending-listings">
          <p class="no-pending">Loading...</p>
        </div>
      </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/api.js"></script>
    <script>
      // Nav toggle
      const toggle = document.getElementById("navToggle");
      const links = document.getElementById("navLinks");
      if (toggle && links) {
        toggle.addEventListener("click", function (e) {
          e.stopPropagation();
          links.classList.toggle("open");
          toggle.classList.toggle("active");
        });
        document.addEventListener("click", function (e) {
          if (!links.contains(e.target) && !toggle.contains(e.target)) {
            links.classList.remove("open");
            toggle.classList.remove("active");
          }
        });
      }

      window.onload = function () {
        loadPendingListings();
        document
          .getElementById("logout-link")
          .addEventListener("click", handleLogout);
      };

      async function loadPendingListings() {
        const container = document.getElementById("pending-listings");
        try {
          const data = await apiFetch("/api/admin/listings");
          if (data.length === 0) {
            container.innerHTML =
              '<p class="no-pending">✅ No pending listings to review.</p>';
            return;
          }
          container.innerHTML = data
            .map(
              (listing) => `
                    <div class="admin-listing-card">
                        <div class="admin-listing-image">
                            ${
                              listing.images && listing.images.length > 0
                                ? `<img src="/uploads/${listing.images[0].filename}" alt="${listing.title}">`
                                : `<div class="no-image" style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:0.9rem;">No image</div>`
                            }
                        </div>
                        <div class="admin-listing-info">
                            <h3>${listing.title}</h3>
                            <p class="price">$${listing.price.toLocaleString()}</p>
                            <p class="location">📍 ${listing.location}</p>
                            <p class="seller">👤 Seller: ${listing.seller_name}</p>
                            <p class="created">📅 Posted: ${new Date(listing.created_at).toLocaleDateString()}</p>
                        </div>
                        <div class="admin-listing-actions">
                            <button class="btn-approve" data-id="${listing.id}">✅ Approve</button>
                            <button class="btn-reject" data-id="${listing.id}">❌ Reject</button>
                        </div>
                    </div>
                `,
            )
            .join("");

          document.querySelectorAll(".btn-approve").forEach((btn) => {
            btn.addEventListener("click", async function () {
              const id = this.dataset.id;
              await apiFetch(`/api/admin/listings/${id}/approve`, {
                method: "POST",
              });
              loadPendingListings();
            });
          });
          document.querySelectorAll(".btn-reject").forEach((btn) => {
            btn.addEventListener("click", async function () {
              const id = this.dataset.id;
              await apiFetch(`/api/admin/listings/${id}/reject`, {
                method: "POST",
              });
              loadPendingListings();
            });
          });
        } catch (err) {
          container.innerHTML = `<p class="error" style="color:#dc2626;">⚠️ Error: ${err.message}</p>`;
        }
      }

      async function handleLogout(e) {
        e.preventDefault();
        await apiFetch("/api/logout", { method: "POST" });
        window.location.href = "/";
      }
    </script>
  </body>
</html>
